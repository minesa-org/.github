<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Member | Minesa Studios</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      @property --sticker-parallax-y {
        syntax: '<length>';
        inherits: false;
        initial-value: 0px;
      }

      @property --sticker-parallax-x {
        syntax: '<length>';
        inherits: false;
        initial-value: 0px;
      }

      @property --sticker-hover-scale {
        syntax: '<number>';
        inherits: false;
        initial-value: 1;
      }

      @property --sticker-float-scale {
        syntax: '<number>';
        inherits: false;
        initial-value: 1;
      }

      :root {
        --theme-bg: #1b1b1b;
        --theme-text: #ffffff;
        --theme-muted: color-mix(in srgb, var(--theme-text) 34%, transparent);
        --gallery-border: #000000;
        --highlight-color: #ffffff;
      }

      body.member-theme {
        background-color: var(--theme-bg);
        color: var(--theme-text);
        width: auto;
        height: auto;
        display: block;
        min-height: 100vh;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 8vh 5vw;
        position: relative;
        transition:
          background-color 420ms ease,
          color 420ms ease;
      }

      body.member-theme::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: rgba(0, 0, 0, 0);
        transition: background 360ms ease;
        z-index: 4;
      }

      body.member-theme.route-leaving::after {
        background: rgba(0, 0, 0, 0.18);
      }

      .member-fire-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        opacity: 0;
        z-index: 0;
        transition: opacity 320ms ease;
      }

      body.member-theme[data-member='neo'] .member-fire-canvas,
      body.member-theme[data-member='mica'] .member-fire-canvas,
      body.member-theme[data-member='saku'] .member-fire-canvas {
        opacity: 1;
      }

      .member-loading-screen {
        position: fixed;
        inset: 0;
        z-index: 6;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background:
          linear-gradient(180deg, color-mix(in srgb, var(--theme-bg) 96%, black) 0%, color-mix(in srgb, var(--theme-bg) 92%, black) 100%);
        color: var(--theme-text);
        opacity: 1;
        visibility: visible;
        transition:
          background 420ms ease,
          opacity 420ms ease,
          visibility 420ms ease;
      }

      body.member-theme.is-ready .member-loading-screen {
        opacity: 0;
        visibility: hidden;
      }

      .member-loading-label {
        font-family: var(--font-mono);
        letter-spacing: 2px;
        text-transform: uppercase;
        font-size: 12px;
      }

      .member-loading-bar {
        width: min(220px, 56vw);
        height: 2px;
        background: color-mix(in srgb, var(--theme-text) 18%, transparent);
        overflow: hidden;
      }

      .member-loading-bar > span {
        display: block;
        width: 42%;
        height: 100%;
        background: var(--theme-text);
        animation: member-loading-scan 1.1s ease-in-out infinite;
        transform: translateX(-120%);
      }

      @keyframes member-loading-scan {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(320%); }
      }

      .member-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 16px;
        margin-bottom: 2vh;
      }

      .member-header-meta {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .member-switcher {
        position: relative;
        display: inline-flex;
        align-items: center;
      }

      .member-switcher-trigger {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 8px 10px;
        margin: -8px -10px;
        border: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        cursor: pointer;
      }

      .member-switcher-trigger:focus-visible {
        outline: 1px solid color-mix(in srgb, var(--theme-text) 30%, transparent);
        outline-offset: 4px;
        border-radius: 999px;
      }

      .member-route-nav {
        position: absolute;
        top: calc(100% + 12px);
        left: 0;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
        min-width: 220px;
        padding: 10px;
        border-radius: 18px;
        border: 1px solid color-mix(in srgb, var(--theme-text) 14%, transparent);
        background: color-mix(in srgb, var(--theme-bg) 88%, black 12%);
        backdrop-filter: blur(16px);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.18);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transform: translateY(10px) scale(0.98);
        transform-origin: top left;
        transition:
          opacity 220ms ease,
          visibility 220ms ease,
          transform 220ms ease,
          border-color 220ms ease,
          background 220ms ease;
        z-index: 20;
      }

      .member-switcher:hover .member-route-nav,
      .member-switcher:focus-within .member-route-nav {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        transform: translateY(0) scale(1);
      }

      .member-route-link {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-family: var(--font-mono);
        font-size: 11px;
        line-height: 1;
        letter-spacing: 2px;
        text-transform: uppercase;
        width: 100%;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid color-mix(in srgb, var(--theme-text) 14%, transparent);
        color: var(--theme-muted);
        background: color-mix(in srgb, var(--theme-bg) 76%, transparent);
        text-decoration: none;
        transition:
          color 220ms ease,
          background 220ms ease,
          border-color 220ms ease,
          transform 220ms ease,
          opacity 220ms ease;
      }

      .member-route-link:hover {
        opacity: 1;
        color: var(--theme-text);
        transform: translateY(-1px);
      }

      .member-route-link.is-active {
        color: var(--theme-text);
        background: color-mix(in srgb, var(--theme-text) 12%, transparent);
        border-color: color-mix(in srgb, var(--theme-text) 24%, transparent);
      }

      .member-route-avatar {
        width: 26px;
        height: 26px;
        border-radius: 999px;
        object-fit: cover;
        flex: 0 0 auto;
      }

      .member-route-name {
        display: inline-block;
      }

      body.member-theme main.innerforge-container {
        display: block;
        height: auto;
        min-height: 0;
        position: relative;
        z-index: 2;
        opacity: 0;
        transform: translateY(26px) scale(0.988);
        filter: blur(10px);
        transition:
          opacity 520ms cubic-bezier(0.22, 1, 0.36, 1),
          transform 520ms cubic-bezier(0.22, 1, 0.36, 1),
          filter 520ms ease;
      }

      body.member-theme.is-ready main.innerforge-container {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }

      body.member-theme.route-leaving main.innerforge-container {
        opacity: 0;
        transform: translateY(22px) scale(0.985);
        filter: blur(12px);
      }

      .member-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        object-fit: cover;
      }

      .member-name-label {
        font-family: var(--font-mono);
        text-transform: uppercase;
        letter-spacing: 2px;
        font-size: 14px;
        color: var(--theme-muted);
      }

      .member-header .if-logo-link {
        transform-origin: center;
        color: var(--theme-text) !important;
      }

      .member-header .if-logo-icon {
        height: 32px;
        width: auto;
        transform-origin: center;
        transition: transform 220ms ease;
      }

      .member-header .if-logo-link:hover .if-logo-icon {
        animation: playful-logo-wobble 700ms cubic-bezier(0.175, 0.885, 0.32, 1.275) infinite;
      }

      .signature-container {
        margin: 4vh 0;
        height: 130px;
        max-height: 130px;
        display: flex;
        align-items: center;
      }

      .signature-asset {
        height: 130px;
        max-height: 130px;
        width: auto;
        max-width: 100%;
        display: block;
      }

      .signature-asset.signature-dark {
        filter: brightness(0);
      }

      .signature-asset.signature-light {
        filter: brightness(0) invert(1);
      }

      body.member-theme[data-member='mica'] .signature-asset {
        filter: brightness(0) invert(1);
      }

      body.member-theme[data-member='neo'] .if-logo-icon path,
      body.member-theme[data-member='mica'] .if-logo-icon path,
      body.member-theme[data-member='saku'] .if-logo-icon path {
        opacity: 0.6;
      }

      body.member-theme[data-member='neo'] .if-logo-icon #letter-n,
      body.member-theme[data-member='neo'] .if-logo-icon #letter-e,
      body.member-theme[data-member='mica'] .if-logo-icon #letter-m,
      body.member-theme[data-member='mica'] .if-logo-icon #letter-i,
      body.member-theme[data-member='saku'] .if-logo-icon #letter-s,
      body.member-theme[data-member='saku'] .if-logo-icon #letter-a {
        opacity: 1;
      }

      body.member-theme[data-member='mica'] {
        --theme-text: #ffffff;
      }

      body.member-theme[data-member='saku'] {
        --highlight-color: #1b1b1b;
      }

      body.member-theme[data-member='saku'] .member-route-link {
        color: #1b1b1b;
        border-color: rgba(27, 27, 27, 0.22);
        background: rgba(255, 246, 206, 0.72);
      }

      body.member-theme[data-member='saku'] .member-route-nav {
        color: #1b1b1b;
      }

      body.member-theme[data-member='saku'] .member-route-nav .member-route-link,
      body.member-theme[data-member='saku'] .member-route-nav .member-route-link:link,
      body.member-theme[data-member='saku'] .member-route-nav .member-route-link:visited,
      body.member-theme[data-member='saku'] .member-route-name {
        color: #1b1b1b;
      }

      body.member-theme[data-member='saku'] .member-route-nav {
        border-color: rgba(27, 27, 27, 0.24);
        background: rgba(235, 193, 44, 0.92);
        box-shadow: 0 18px 60px rgba(68, 48, 0, 0.24);
      }

      body.member-theme[data-member='saku'] .member-route-link:hover,
      body.member-theme[data-member='saku'] .member-route-link.is-active {
        color: #1b1b1b;
        border-color: rgba(27, 27, 27, 0.22);
        background: rgba(255, 255, 255, 0.3);
      }

      body.member-theme[data-member='saku'] .member-route-link:hover .member-route-name,
      body.member-theme[data-member='saku'] .member-route-link.is-active .member-route-name,
      body.member-theme[data-member='saku'] .member-route-link:hover .member-route-avatar,
      body.member-theme[data-member='saku'] .member-route-link.is-active .member-route-avatar {
        color: #1b1b1b;
      }

      body.member-theme[data-member='saku'] .member-inline-logo {
        color: #1b1b1b;
      }

      body.member-theme[data-member='mica'] .if-logo-icon #letter-m,
      body.member-theme[data-member='mica'] .if-logo-icon #letter-i {
        fill: #ffffff;
      }

      .member-quote {
        font-family: var(--font-garamond);
        font-size: clamp(24px, 4vw, 32px);
        line-height: 1.4;
        margin-bottom: 6vh;
        max-width: 800px;
      }

      .member-word {
        display: inline-block;
        opacity: 0;
        transform: translateY(0.75em);
        filter: blur(8px);
      }

      .member-word.is-visible {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
        transition:
          opacity 520ms cubic-bezier(0.22, 1, 0.36, 1),
          transform 520ms cubic-bezier(0.22, 1, 0.36, 1),
          filter 520ms ease;
      }

      .member-bio {
        font-family: var(--font-mono);
        font-size: 14px;
        line-height: 1.8;
        color: var(--theme-muted);
        max-width: 700px;
        margin-bottom: 4vh;
      }

      .member-bio p {
        margin-bottom: 1em;
      }

      .reveal-item {
        opacity: 0;
        transform: translateY(22px);
        filter: blur(10px);
      }

      .reveal-item.is-visible {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
        transition:
          opacity 560ms cubic-bezier(0.22, 1, 0.36, 1),
          transform 560ms cubic-bezier(0.22, 1, 0.36, 1),
          filter 560ms ease;
      }

      .member-inline-highlight {
        display: inline-flex;
        align-items: center;
        gap: 0.45em;
        margin: 0 0.08em;
        color: var(--highlight-color);
        mix-blend-mode: difference;
        isolation: isolate;
      }

      .member-inline-highlight .member-inline-label {
        color: inherit;
        line-height: 1;
      }

      .member-inline-mark {
        width: auto;
        height: 1em;
        display: block;
      }

      .member-inline-mark-darkvoid {
        height: 1.05em;
      }

      .member-inline-mark-dungeon {
        height: 1.08em;
      }

      .member-inline-logo {
        height: 0.95em;
        width: auto;
        display: block;
      }

      .social-links {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
        font-family: var(--font-mono);
        font-size: 14px;
        margin-bottom: 8vh;
      }

      .social-links-label {
        font-size: 14px;
        line-height: 1.4;
        color: var(--theme-muted);
        letter-spacing: 2px;
        text-transform: uppercase;
        font-family: var(--font-mono);
      }

      .social-links-items {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 18px;
      }

      .social-links a {
        color: inherit;
        text-decoration: none;
        border: none;
        padding-bottom: 0;
        opacity: 1;
        transition: opacity 0.3s;
        font-size: 14px;
        line-height: 1;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-family: var(--font-mono);
      }

      .social-links a:hover {
        opacity: 0.7;
      }

      .social-links-separator {
        width: 0.35rem;
        height: 0.35rem;
        border-radius: 999px;
        background: currentColor;
        opacity: 0.18;
      }

      .social-x-icon {
        width: 0.95em;
        height: 0.95em;
        display: block;
      }

      .gallery-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 4vh;
      }

      .gallery-stage {
        position: relative;
      }

      .stickers-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 15;
      }

      .gallery-item {
        width: 100%;
        aspect-ratio: 1.6;
        background: #000;
        border-radius: 12px;
        overflow: hidden;
        border: 4px solid var(--gallery-border);
      }

      body.member-theme[data-member='mica'] .gallery-item {
        background: #ffffff;
        border-color: #ffffff;
      }

      body.member-theme[data-member='mica'] .if-divider {
        border-top-color: #ffffff;
      }

      .gallery-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .sticker {
        position: absolute;
        pointer-events: auto;
        z-index: 1;
        --sticker-parallax-x: 0px;
        --sticker-parallax-y: 0px;
        --sticker-hover-scale: 1;
        --sticker-float-scale: 1;
        animation: sticker-float var(--sticker-float-duration, 4.8s) ease-in-out var(--sticker-float-delay, 0s) infinite;
        transform:
          translate3d(var(--sticker-parallax-x), var(--sticker-parallax-y), 0)
          scale(calc(var(--sticker-float-scale) * var(--sticker-hover-scale)));
        transform-origin: center;
        transition: transform 220ms cubic-bezier(0.175, 0.885, 0.32, 1.275);
        will-change: transform;
      }

      .sticker:hover {
        --sticker-hover-scale: 0.94;
        animation-play-state: paused;
      }

      @keyframes sticker-float {
        0%,
        100% {
          --sticker-float-scale: 1;
        }

        25% {
          --sticker-float-scale: 1.04;
        }

        50% {
          --sticker-float-scale: 0.98;
        }

        75% {
          --sticker-float-scale: 1.03;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .sticker {
          animation: none;
          transition: none;
        }
      }

      @media (max-width: 768px) {
        .gallery-grid {
          grid-template-columns: 1fr;
        }

        .stickers-layer {
          display: none;
        }

        .social-links-items {
          gap: 12px;
        }

        .social-links-separator {
          width: 0.3rem;
          height: 0.3rem;
        }

        .member-header {
          align-items: flex-start;
        }

        .member-route-nav {
          min-width: 190px;
        }
      }
    </style>
    <script defer src="member.js"></script>
  </head>

    <div class="member-loading-screen" id="loading" aria-live="polite">
      <div class="member-loading-label" id="loading-label">Loading profile</div>
      <div class="member-loading-bar" aria-hidden="true"><span></span></div>
    </div>

    <main class="innerforge-container" id="content">

        <div class="member-header-meta">
