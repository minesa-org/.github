<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dungeon Blitz: R | The Minesa Studios</title>
    <meta
      name="description"
      content="Dungeon Blitz: R is a free-to-play, side-scrolling brawler with light RPG and MMO elements."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:wght@400;700&amp;family=Vollkorn+SC:wght@400;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="dungeon-blitz-r.css" />
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
  </head>
  <body>
    <main class="db-page">
      <section class="db-hero" id="game" aria-label="Dungeon Blitz: R hero">
        <div class="db-hero__backdrop" aria-hidden="true"></div>
        <div class="db-hero__vignette" aria-hidden="true"></div>
        <div class="db-hero__grain" aria-hidden="true"></div>

        <header class="db-header">
          <a class="db-logo" href="#game" aria-label="Dungeon Blitz: R home">
            <img
              src="assets/dungeon_blitz_r/Dungeon Blitz_ R logo.svg"
              alt="Dungeon Blitz R"
            />
          </a>

          <nav class="db-nav" aria-label="Primary">
            <a class="db-nav__link db-nav__link--active" href="#game">Game</a>
            <span
              class="db-nav__link db-nav__link--disabled"
              aria-disabled="true"
              >Disciplines
              <small>Unavailable</small></span
            >
            <span
              class="db-nav__link db-nav__link--disabled"
              aria-disabled="true"
              >Team
              <small>Unavailable</small></span
            >
          </nav>

          <button class="db-launch" type="button" disabled aria-disabled="true">
            Launch Game
          </button>
        </header>

        <div class="db-hero__content">
          <div class="db-copy">
            <img
              class="db-copy__ornament"
              src="assets/dungeon_blitz_r/Icon Row.svg"
              alt=""
            />
            <h1>Dungeon Blitz R</h1>
            <img
              class="db-copy__ornament"
              src="assets/dungeon_blitz_r/Icon Row.svg"
              alt=""
            />
            <p class="db-copy__lead">
              A free-to-play, side-scrolling brawler with light RPG and MMO
              game!
            </p>
            <p class="db-copy__status">Coming Soon</p>
          </div>
        </div>

        <div class="db-credit">
          <div class="db-credit__icons">
            <img src="assets/dungeon_blitz_r/rocking.svg" alt="" />
            <img src="assets/dungeon_blitz_r/eye.svg" alt="" />
          </div>
          <p>Remake by</p>
          <strong>The Minesa Studios</strong>
        </div>
      </section>
    </main>
  </body>
</html>
